services:
  controlit-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: controlit-api:latest
    container_name: controlit-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5290"
      CONTROLIT_DB_CONNECTION: "Server=${CONTROLIT_DB_HOST:-mysql-container};Port=${CONTROLIT_DB_PORT:-3306};Database=${MYSQL_DATABASE};User=${CONTROLIT_DB_USER:-controlit_api};Password=${CONTROLIT_DB_PASSWORD};"
      Database__Name: "${MYSQL_DATABASE}"
      CONTROLIT_JWT_SIGNING_KEY: "${CONTROLIT_JWT_SIGNING_KEY}"
      CONTROLIT_BOOTSTRAP_EMAIL: "${CONTROLIT_BOOTSTRAP_EMAIL}"
      CONTROLIT_BOOTSTRAP_PASSWORD: "${CONTROLIT_BOOTSTRAP_PASSWORD}"
      CONTROLIT_NETLOCK_TOKEN: "${CONTROLIT_NETLOCK_TOKEN}"
      CONTROLIT_NETLOCK_FILES_KEY: "${CONTROLIT_NETLOCK_FILES_KEY}"
      CONTROLIT_AUTO_MIGRATE: "${CONTROLIT_AUTO_MIGRATE:-false}"
      NetLock__HubUrl: "${CONTROLIT_NETLOCK_HUB_URL:-http://netlock-rmm-server:7080/commandHub}"
      Netbird__BaseUrl: "${NETBIRD_BASE_URL:-https://api.netbird.io}"
      Netbird__Token: "${NETBIRD_TOKEN}"
      Cors__AllowedOrigins: "${CONTROLIT_ALLOWED_ORIGINS:-http://localhost:3000}"
      NetLockLiveBridge__PollIntervalSeconds: "${CONTROLIT_NETLOCK_BRIDGE_INTERVAL_SECONDS:-5}"
      NetLockLiveBridge__PageSize: "${CONTROLIT_NETLOCK_BRIDGE_PAGE_SIZE:-500}"
    ports:
      - "${CONTROLIT_API_PORT:-5290}:5290"
    networks:
      - netlock-network
    restart: unless-stopped

  controlit-web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: "${CONTROLIT_PUBLIC_API_URL:-http://localhost:5290}"
    image: controlit-web:latest
    container_name: controlit-web
    environment:
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "${CONTROLIT_WEB_PORT:-3000}:3000"
    networks:
      - netlock-network
    restart: unless-stopped
    depends_on:
      - controlit-api

networks:
  netlock-network:
    name: ${NETLOCK_DOCKER_NETWORK:-netlock-rmm-api-layer_netlock-network}
    external: true
